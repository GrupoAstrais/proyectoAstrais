ktor:
    application:
        modules:
            - com.astrais.ApplicationKt.module
    deployment:
        port: ${?KTOR_PORT:-8080}

jwt:
    issuer: ${?JWT_ISSUER:-"ASTRAIS.ISSUER"}
    audience: ${?JWT_AUDIENCE:-"ASTRAIS.USERS"}
    secret: ${?JWT_SECRET:-"ASTRAIS.FIRMA.A.CAMBIAR."}
    expiration: ${?JWT_EXPIRATION_MS:-"3600000"}

db:
    user: ${?DB_USER:-"root"}
    password: ${?DB_PASSWORD:-"root"}
    dbname: ${?DB_NAME:-"db"}

oauth:
    google:
        clientId: ${?GOOGLE_CLIENT_ID:-"GOOGLE_CLIENT_ID"}
        clientSecret: ${?GOOGLE_CLIENT_SECRET:-"GOOGLE_CLIENT_SECRET"}