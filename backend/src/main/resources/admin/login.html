<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Astrais Admin - Login</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            color: #1e293b;
            text-align: center;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            color: #64748b;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }

        .error {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 1rem;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h1>Astrais Admin</h1>
        <form id="login-form">
            <div class="input-group">
                <label>Email Administrador</label>
                <input type="email" id="email" required placeholder="admin@astrais.com">
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="password" required>
            </div>
            <button id="logButton" type="submit">Entrar al Panel</button>
            <div id="login-error" class="error" style="display: none;">Credenciales incorrectas o no eres administrador.
            </div>
        </form>
    </div>

    <script src="constant.js"></script>

    <script>
        const logbtt = document.getElementById("logButton");

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            logbtt.style.visibility = "hidden";

            const err = document.getElementById('login-error');
            err.style.display = 'none';

            try {
                const res = await fetch(API_URL + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        passwd: document.getElementById('password').value
                    })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem(STORAGE_ACCESS, data.jwtAccessToken);
                    localStorage.setItem(STORAGE_REFRESH, data.jwtRefreshToken);
                    if (await checkIfAdmin(data.jwtAccessToken)) {
                        window.location.href = INDEX_URL;
                    } else {
                        localStorage.setItem(STORAGE_ACCESS, null);
                        localStorage.setItem(STORAGE_REFRESH, null);
                        err.style.display = 'block';
                        err.textContent = "You are not admin";
                    }
                } else {
                    err.style.display = 'block';
                    err.textContent = "Invalid credentials";
                }
            } catch (e) {
                err.style.display = 'block';
                err.textContent = "Error! " + e;
            } finally {
                logbtt.style.visibility = "visible";
            }
        };


        async function checkIfAdmin(token) {
            try {
                const res = await requestServerProtected(API_URL + '/auth/me', {
                    method: 'get',
                    headers: { 'Content-Type': 'application/json' }
                })
                if (res.ok) {
                    return (await res.json())["isAdmin"];
                } else {
                    console.log("Error!" + (await res.text()))
                }
            } catch (e) {
                console.log("Error seeking admin: " + e)
            }
            return false;
        }

    </script>
</body>

</html>
