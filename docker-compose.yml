services:
  database:
    image: "postgres:17"
    # Con este comando, se exporta el .env al contenedor segun la guia de docker
    
    env_file:
      - ./.env.test

    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    
    volumes:
      - ./db-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  backend:
    env_file:
      - ./.env.test
    build:
      context: .
      dockerfile: ./docker/dockerfile.ktor
    ports:
      - ${KTOR_PORT}:${KTOR_PORT}
    depends_on:
      database:
        condition: service_healthy