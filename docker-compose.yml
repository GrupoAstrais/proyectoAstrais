services:
  database:
    image: "postgres:17"
    # Con este comando, se exporta el .env al contenedor segun la guia de docker
    
    env_file:
      - ./.env

    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    
    volumes:
      - db-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  backend:
    env_file:
      - ./.env
    
    build:
      context: .
      dockerfile: ./docker/dockerfile.ktor
    ports:
      - ${KTOR_PORT}:${KTOR_PORT}
    
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      KTOR_PORT: ${KTOR_PORT}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_SECRET_ACCESS: ${JWT_SECRET_ACCESS}
      JWT_SECRET_REFRESH: ${JWT_SECRET_REFRESH}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_SECRET_ID: ${GOOGLE_SECRET_ID}
      SMTP_EMAIL: ${SMTP_EMAIL}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      IS_DEV: ${IS_DEV}

    volumes:
      - upload-data:/uploads

    depends_on:
      database:
        condition: service_healthy

volumes:
  db-data:
  upload-data: