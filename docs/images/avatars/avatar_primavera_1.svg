<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <defs>
        <!-- Máscara de recorte para asegurar que las enredaderas no se salgan del cuerpo -->
        <clipPath id="cuerpoClip">
            <path d="M 15 100 A 35 35 0 0 1 85 100 Z"/>
        </clipPath>
    </defs>

    <!-- FONDO SÓLIDO (Añadido aquí) -->
    <rect width="100" height="100" fill="#1A2922"/>

    <!-- CUERPO (Semicírculo base) -->
    <g clip-path="url(#cuerpoClip)">
        <!-- Color base del cuerpo -->
        <path d="M 15 100 A 35 35 0 0 1 85 100 Z" fill="#558B2F"/>
        
        <!-- Patrón sutil de enredaderas entrelazadas -->
        <path d="M 10 90 Q 30 70 50 100 T 90 80" fill="none" stroke="#81C784" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M 20 110 Q 40 80 70 110 T 100 70" fill="none" stroke="#81C784" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- CABEZA (Círculo base) -->
    <circle cx="50" cy="40" r="25" fill="#A5D6A7"/>

    <!-- CORONA FLORAL -->
    <!-- Hilo/tallo de la corona -->
    <path d="M 27 34 Q 50 16 73 34" fill="none" stroke="#81C784" stroke-width="1.5"/>
    
    <!-- Flor 1 (Izquierda) -->
    <circle cx="27" cy="34" r="3.5" fill="#FFFFFF"/>
    <circle cx="27" cy="34" r="1.5" fill="#FFF59D"/>
    
    <!-- Flor 2 (Centro-Izquierda) -->
    <circle cx="38" cy="25" r="3.5" fill="#FFFFFF"/>
    <circle cx="38" cy="25" r="1.5" fill="#FFF59D"/>
    
    <!-- Flor 3 (Centro) -->
    <circle cx="50" cy="20" r="3.5" fill="#FFFFFF"/>
    <circle cx="50" cy="20" r="1.5" fill="#FFF59D"/>

    <!-- Flor 4 (Centro-Derecha) -->
    <circle cx="62" cy="25" r="3.5" fill="#FFFFFF"/>
    <circle cx="62" cy="25" r="1.5" fill="#FFF59D"/>

    <!-- Flor 5 (Derecha) -->
    <circle cx="73" cy="34" r="3.5" fill="#FFFFFF"/>
    <circle cx="73" cy="34" r="1.5" fill="#FFF59D"/>
</svg>
