<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <defs>
        <!-- Máscara de recorte para no salirnos de la silueta base del cuerpo -->
        <clipPath id="cuerpoClip">
            <path d="M 15 100 A 35 35 0 0 1 85 100 Z"/>
        </clipPath>
    </defs>

    <!-- FONDO SÓLIDO (Opcional, usando el background del tema Primavera) -->
    <rect width="100" height="100" fill="#1A0F14"/>

    <!-- CUERNOS / RAMITAS (Dibujados por detrás de la cabeza) -->
    <!-- Rama izquierda -->
    <path d="M 28 35 Q 18 20 15 10 M 22 25 L 13 24 M 25 18 L 18 12" 
          fill="none" stroke="#795548" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Rama derecha -->
    <path d="M 72 35 Q 82 20 85 10 M 78 25 L 87 24 M 75 18 L 82 12" 
          fill="none" stroke="#795548" stroke-width="2" stroke-linecap="round"/>

    <!-- CUERPO Y CAPA DE HOJAS -->
    <g clip-path="url(#cuerpoClip)">
        <!-- Color base del cuerpo (Marrón oscuro) -->
        <path d="M 15 100 A 35 35 0 0 1 85 100 Z" fill="#4E342E"/>
        
        <!-- Hoja central trasera (Verde oscuro) -->
        <path d="M 50 55 Q 25 80 50 110 Q 75 80 50 55" fill="#2E7D32"/>
        
        <!-- Hoja lateral izquierda (Verde medio) -->
        <path d="M 35 60 Q 5 80 20 110 Q 45 95 35 60" fill="#388E3C"/>
        
        <!-- Hoja lateral derecha (Verde medio) -->
        <path d="M 65 60 Q 95 80 80 110 Q 55 95 65 60" fill="#388E3C"/>
        
        <!-- Hoja superior frontal (Verde claro/oliva) -->
        <path d="M 50 65 Q 35 85 50 105 Q 65 85 50 65" fill="#4CAF50"/>
    </g>

    <!-- CABEZA (Círculo base en Rosa cerezo) -->
    <circle cx="50" cy="40" r="25" fill="#F48FB1"/>

</svg>
